name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: |
          pytest -q

      - name: Smoke-test figure generation (quick)
        run: |
          python -m src.reproduce_all --quick --dpi 100

      - name: Print ablation summary from committed JSON
        run: |
          python -m src.ablations.reproduce_all --summary-only

      - name: Verify reference classification totals
        run: |
          python -m docs.reference_classification

      - name: Upload figures as artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: figures
          path: figures/*.png
          retention-days: 14
